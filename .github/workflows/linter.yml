name: linter

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

jobs:
  linter:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: golangci-lint
      uses: reviewdog/action-golangci-lint@v2.10.0
      with:
        cache: true
        golangci_lint_version: v2.11.4
        reviewdog_version: v0.21.0
        go_version_file: go.mod
        github_token: ${{ secrets.GITHUB_TOKEN }}
        golangci_lint_flags: ${{ github.event_name == 'pull_request' && format('--new-from-rev={0}', github.event.pull_request.base.sha) || '' }}
        filter_mode: added
        fail_level: error
        tool_name: golangci-lint

  golangci-lint-full:
    name: golangci-lint full
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: golangci-lint full
      uses: reviewdog/action-golangci-lint@v2.10.0
      with:
        cache: true
        golangci_lint_version: v2.11.4
        reviewdog_version: v0.21.0
        go_version_file: go.mod
        github_token: ${{ secrets.GITHUB_TOKEN }}
        golangci_lint_flags: ./...
        reporter: github-check
        filter_mode: nofilter
        fail_level: error
        tool_name: golangci-lint-full
