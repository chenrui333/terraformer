name: govulncheck

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

env:
  GOWORK: off

jobs:
  source-scan:
    name: source scan (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
    - name: Run blocking source package vulnerability scan
      run: ONLY_GOVULNCHECK=1 bash .github/scripts/provider-dependency-preflight.sh

  module-scan:
    name: module scan (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
    - name: Run report-only module vulnerability scan
      id: govulncheck
      continue-on-error: true
      run: govulncheck -scan=module ./...
    - name: Record non-blocking baseline
      if: steps.govulncheck.outcome == 'failure'
      run: |
        {
          echo "### govulncheck module scan"
          echo
          echo "The module scan found vulnerabilities in the current dependency baseline."
          echo "This module-level baseline is report-only; the source scan job is the blocking security gate."
        } >> "$GITHUB_STEP_SUMMARY"
