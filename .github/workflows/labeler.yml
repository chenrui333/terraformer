name: pull request labels

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: label pull request
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels
        uses: actions/labeler@v6.0.1
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
