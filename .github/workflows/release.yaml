name: release

on:
  pull_request:
    paths:
    - .github/release.yml
    - .github/scripts/**
    - .github/workflows/release.yaml
    - .goreleaser.yaml
    - build/**
    - CHANGELOG.md
    - go.mod
    - go.sum
    - RELEASE.md
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish; leave empty to run a snapshot preflight.
        required: false
        type: string
  push:
    tags:
    - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

env:
  GOWORK: off
  GOFLAGS: -p=1
  GORELEASER_VERSION: v2.15.4
  GORELEASER_TIMEOUT: 3h

jobs:
  check:
    name: GoReleaser Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: GoReleaser Check
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
      with:
        distribution: goreleaser
        version: ${{ env.GORELEASER_VERSION }}
        args: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  provider-preflight:
    name: Provider Preflight
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Run provider dependency preflight
      run: MODE=full bash .github/scripts/provider-dependency-preflight.sh

  source-scan:
    name: Source Vulnerability Scan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Run blocking source vulnerability scan
      run: ONLY_GOVULNCHECK=1 bash .github/scripts/provider-dependency-preflight.sh

  goreleaser-check:
    name: GoReleaser Config Check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}
    - name: GoReleaser Check
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
      with:
        distribution: goreleaser
        version: ${{ env.GORELEASER_VERSION }}
        args: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snapshot:
    name: Snapshot Release
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
    - provider-preflight
    - source-scan
    - goreleaser-check
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: GoReleaser Snapshot
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
      with:
        distribution: goreleaser
        version: ${{ env.GORELEASER_VERSION }}
        args: release --snapshot --clean --skip=publish --timeout=${{ env.GORELEASER_TIMEOUT }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    needs: snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag || github.ref }}
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: GoReleaser Release
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
      with:
        distribution: goreleaser
        version: ${{ env.GORELEASER_VERSION }}
        args: release --clean --timeout=${{ env.GORELEASER_TIMEOUT }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
