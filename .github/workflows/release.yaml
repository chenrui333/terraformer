name: release

on:
  pull_request:
    paths:
    - .github/release.yml
    - .github/workflows/release.yaml
    - .goreleaser.yaml
    - build/**
    - CHANGELOG.md
    - go.mod
    - go.sum
    - RELEASE.md
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish; leave empty to run a snapshot preflight.
        required: false
        type: string
  push:
    tags:
    - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

env:
  GOWORK: off
  GORELEASER_VERSION: v2.15.4
  GORELEASER_TIMEOUT: 3h

jobs:
  check:
    name: GoReleaser Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: GoReleaser Check
      uses: goreleaser/goreleaser-action@v7.1.0
      with:
        distribution: goreleaser
        version: ${{ env.GORELEASER_VERSION }}
        args: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snapshot:
    name: Snapshot Release
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag == ''
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test ./... -count=1
    - name: GoReleaser Snapshot
      uses: goreleaser/goreleaser-action@v7.1.0
      with:
        distribution: goreleaser
        version: ${{ env.GORELEASER_VERSION }}
        args: release --snapshot --clean --skip=publish --timeout=${{ env.GORELEASER_TIMEOUT }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag || github.ref }}
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test ./... -count=1
    - name: GoReleaser Release
      uses: goreleaser/goreleaser-action@v7.1.0
      with:
        distribution: goreleaser
        version: ${{ env.GORELEASER_VERSION }}
        args: release --clean --timeout=${{ env.GORELEASER_TIMEOUT }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
