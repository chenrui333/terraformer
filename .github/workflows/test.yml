name: tests

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

env:
  GOWORK: off

jobs:
  test:
    name: test (ubuntu-latest)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Go Mod Tidy
      run: go mod tidy
    - name: Check go.mod and go.sum
      run: git diff --exit-code -- go.mod go.sum
    - name: Test core packages
      run: bash .github/scripts/pr-core-test.sh

  preflight_build:
    name: preflight build packages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Build non-fixture packages
      env:
        MODE: quick
        BASE_REF: ${{ github.event.pull_request.base.sha }}
        ONLY_BUILD_NON_FIXTURE: "1"
      run: bash .github/scripts/provider-dependency-preflight.sh

  provider_dependency_tests:
    name: provider dependency tests (${{ matrix.shard }})
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        shard: [a, b]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Test provider and command packages
      env:
        MODE: quick
        BASE_REF: ${{ github.event.pull_request.base.sha }}
        ONLY_PROVIDER_COMMAND_TESTS: "1"
        PROVIDER_COMMAND_TEST_SHARD: ${{ matrix.shard }}
      run: bash .github/scripts/provider-dependency-preflight.sh

  provider_dependency_validation:
    name: provider dependency validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Check provider command test shards
      env:
        MODE: full
        BASE_REF: ${{ github.event.pull_request.base.sha }}
        ONLY_CHECK_PROVIDER_COMMAND_TEST_SHARDS: "1"
      run: bash .github/scripts/provider-dependency-preflight.sh
    - name: Run provider dependency preflight
      env:
        MODE: quick
        BASE_REF: ${{ github.event.pull_request.base.sha }}
        SKIP_BUILD_NON_FIXTURE: "1"
        SKIP_PROVIDER_COMMAND_TESTS: "1"
        SKIP_VET_DEPENDENCY_PACKAGES: "1"
      run: bash .github/scripts/provider-dependency-preflight.sh

  provider_dependency_vet:
    name: provider dependency vet
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Vet dependency-sensitive packages
      env:
        MODE: quick
        BASE_REF: ${{ github.event.pull_request.base.sha }}
        ONLY_VET_DEPENDENCY_PACKAGES: "1"
      run: bash .github/scripts/provider-dependency-preflight.sh

  provider-dependency-preflight:
    name: provider dependency preflight
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs:
    - preflight_build
    - provider_dependency_tests
    - provider_dependency_validation
    - provider_dependency_vet
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Check provider preflight shards
      env:
        BUILD_RESULT: ${{ needs.preflight_build.result }}
        PROVIDER_TEST_RESULT: ${{ needs.provider_dependency_tests.result }}
        VALIDATION_RESULT: ${{ needs.provider_dependency_validation.result }}
        VET_RESULT: ${{ needs.provider_dependency_vet.result }}
      run: |
        printf 'preflight build packages: %s\n' "$BUILD_RESULT"
        printf 'provider dependency tests: %s\n' "$PROVIDER_TEST_RESULT"
        printf 'provider dependency validation: %s\n' "$VALIDATION_RESULT"
        printf 'provider dependency vet: %s\n' "$VET_RESULT"
        if [[ "$BUILD_RESULT" != "success" || "$PROVIDER_TEST_RESULT" != "success" || "$VALIDATION_RESULT" != "success" || "$VET_RESULT" != "success" ]]; then
          printf 'provider dependency preflight failed because one or more shards failed.\n' >&2
          exit 1
        fi

  provider-dependency-preflight-full:
    name: provider dependency preflight (full)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Run provider dependency preflight
      env:
        MODE: full
        BASE_REF: origin/main
      run: bash .github/scripts/provider-dependency-preflight.sh

  full:
    name: full test (${{ matrix.platform }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Go Mod Tidy
      run: go mod tidy
    - name: Check go.mod and go.sum
      run: git diff --exit-code -- go.mod go.sum
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test ./... -count=1
    - name: Vet
      run: go vet ./...

  terraform-state-compat:
    name: terraform state compatibility
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Test Terraform state compatibility
      run: bash .github/scripts/terraform-state-compat.sh

  terraform-provider-compat:
    name: terraform provider compatibility
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Test Terraform provider compatibility
      run: bash .github/scripts/terraform-provider-compat.sh
