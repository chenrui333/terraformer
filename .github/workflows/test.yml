name: tests

on:
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

env:
  GOWORK: off

jobs:
  test:
    name: test (ubuntu-latest)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Go Mod Tidy
      run: go mod tidy
    - name: Check go.mod and go.sum
      run: git diff --exit-code -- go.mod go.sum
    - name: Test changed packages
      run: |
        set -euo pipefail

        declare -A package_set=(
          [.]=""
          [./build/...]=""
          [./cmd]=""
          [./terraformutils/...]=""
          [./version]=""
        )

        while IFS= read -r file; do
          case "$file" in
            providers/*/*)
              provider="${file#providers/}"
              provider="${provider%%/*}"
              package_set["./providers/${provider}/..."]=""
              ;;
            tests/*/*)
              suite="${file#tests/}"
              suite="${suite%%/*}"
              package_set["./tests/${suite}/..."]=""
              ;;
          esac
        done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")

        mapfile -t packages < <(printf '%s\n' "${!package_set[@]}" | sort)
        printf 'Testing packages:\n'
        printf '  %s\n' "${packages[@]}"
        go test "${packages[@]}" -count=1

  full:
    name: full test (${{ matrix.platform }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@v6
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Go Mod Tidy
      run: go mod tidy
    - name: Check go.mod and go.sum
      run: git diff --exit-code -- go.mod go.sum
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test ./... -count=1
    - name: Vet
      run: go vet ./...
