name: tests

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

env:
  GOWORK: off

jobs:
  test:
    name: test (ubuntu-latest)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Go Mod Tidy
      run: go mod tidy
    - name: Check go.mod and go.sum
      run: git diff --exit-code -- go.mod go.sum
    - name: Test core packages
      run: go test ./build/... ./terraformutils/... ./version ./cmd ./providers ./providers/aws ./providers/gcp ./providers/azure -count=1

  provider-dependency-preflight:
    name: provider dependency preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Free runner disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Run provider dependency preflight
      env:
        MODE: ${{ github.event_name == 'pull_request' && 'quick' || 'full' }}
        BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'origin/main' }}
      run: bash .github/scripts/provider-dependency-preflight.sh

  full:
    name: full test (${{ matrix.platform }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Go Mod Tidy
      run: go mod tidy
    - name: Check go.mod and go.sum
      run: git diff --exit-code -- go.mod go.sum
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test ./... -count=1
    - name: Vet
      run: go vet ./...

  terraform-state-compat:
    name: terraform state compatibility
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Test Terraform state compatibility
      run: bash .github/scripts/terraform-state-compat.sh

  terraform-provider-compat:
    name: terraform provider compatibility
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Test Terraform provider compatibility
      run: bash .github/scripts/terraform-provider-compat.sh
